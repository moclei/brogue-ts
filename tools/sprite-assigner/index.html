<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BrogueCE Sprite Assigner</title>
<style>
:root {
  --bg: #111118;
  --bg-panel: #1a1a24;
  --bg-hover: #252535;
  --bg-active: #2a2a40;
  --border: #333345;
  --text: #d0d0dd;
  --text-dim: #888899;
  --accent: #4a9eff;
  --accent-dim: #2a6ecc;
  --selected: #ffe04a;
  --assigned: #4aff8e;
  --danger: #ff4a5a;
  --radius: 4px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; font-size: 13px;
  color: var(--text); background: var(--bg); overflow: hidden; height: 100vh; }
button { font: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--bg-panel);
  color: var(--text); border-radius: var(--radius); padding: 4px 10px; }
button:hover { background: var(--bg-hover); }
button.primary { background: var(--accent-dim); border-color: var(--accent); color: #fff; }
button.primary:hover { background: var(--accent); }
input, select { font: inherit; background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px 8px; }

header { display: flex; align-items: center; gap: 12px; padding: 8px 16px;
  background: var(--bg-panel); border-bottom: 1px solid var(--border); height: 44px; }
header h1 { font-size: 15px; font-weight: 600; white-space: nowrap; }
header .spacer { flex: 1; }
#stats { color: var(--text-dim); font-size: 12px; white-space: nowrap; }

main { display: grid; grid-template-columns: 200px 1fr 340px; height: calc(100vh - 44px); }

/* ---- Sheet panel (left) ---- */
#sheet-panel { background: var(--bg-panel); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 6px 0; }
.tileset-group summary { cursor: pointer; padding: 6px 12px; font-weight: 600; font-size: 12px;
  color: var(--accent); text-transform: uppercase; letter-spacing: .5px; }
.tileset-group summary:hover { background: var(--bg-hover); }
.sheet-btn { display: block; width: 100%; text-align: left; border: none; border-radius: 0;
  padding: 4px 12px 4px 20px; font-size: 12px; background: transparent; }
.sheet-btn:hover { background: var(--bg-hover); }
.sheet-btn.active { background: var(--bg-active); color: var(--accent); }
.sheet-btn .cat { color: var(--text-dim); font-size: 10px; margin-left: 4px; }

/* ---- Grid panel (center) ---- */
#grid-panel { display: flex; flex-direction: column; overflow: hidden; }
#grid-toolbar { display: flex; align-items: center; gap: 8px; padding: 6px 12px;
  border-bottom: 1px solid var(--border); background: var(--bg-panel); min-height: 36px; flex-shrink: 0; }
#grid-toolbar .label { font-weight: 600; }
#grid-toolbar .dim { color: var(--text-dim); font-size: 12px; }
#zoom-controls { display: flex; align-items: center; gap: 4px; margin-left: auto; }
#zoom-controls button { padding: 2px 8px; font-size: 14px; }
#grid-container { flex: 1; overflow: auto; position: relative; background: #0a0a12;
  image-rendering: pixelated; }
#grid-canvas { image-rendering: pixelated; cursor: crosshair; display: block; }
#selection-bar { display: flex; align-items: center; gap: 10px; padding: 6px 12px;
  border-top: 1px solid var(--border); background: var(--bg-panel); min-height: 40px; flex-shrink: 0; }
#sel-preview { width: 48px; height: 48px; image-rendering: pixelated; border: 1px solid var(--border);
  background: #000; flex-shrink: 0; }
#sel-info { font-size: 12px; }
#sel-info .coord { color: var(--selected); font-weight: 600; }
#sel-info .hint { color: var(--text-dim); font-size: 11px; }
#sel-clear { background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  font-size: 11px; padding: 2px 8px; margin-left: auto; flex-shrink: 0; }
#sel-clear:hover { color: var(--text); border-color: var(--text-dim); }
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #1a3a25; border: 1px solid var(--assigned); color: var(--assigned);
  padding: 6px 16px; border-radius: 6px; font-size: 12px; z-index: 200;
  opacity: 0; transition: opacity .2s; pointer-events: none; }
#toast.show { opacity: 1; }

/* ---- Enum panel (right) ---- */
#enum-panel { display: flex; flex-direction: column; background: var(--bg-panel);
  border-left: 1px solid var(--border); overflow: hidden; }
#enum-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#enum-tabs button { flex: 1; border: none; border-radius: 0; padding: 8px; font-size: 12px;
  font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
#enum-tabs button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
#enum-filter { display: flex; gap: 6px; padding: 6px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#enum-filter input { flex: 1; }
#enum-filter select { width: 110px; }
#enum-list { flex: 1; overflow-y: auto; padding: 4px 0; }

.enum-entry { display: flex; align-items: center; gap: 6px; padding: 3px 8px; min-height: 32px;
  border-bottom: 1px solid var(--bg); border-left: 3px solid transparent; cursor: pointer;
  transition: background .15s, border-color .15s; }
.enum-entry:hover { background: var(--bg-hover); }
.enum-entry.same-tile { border-left-color: var(--selected); }
.enum-entry.flash { background: rgba(74,255,142,0.25); transition: none; }
.enum-ascii { width: 22px; text-align: center; font-size: 16px; color: var(--text-dim); flex-shrink: 0; }
.enum-name { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.enum-sprite { width: 28px; height: 28px; image-rendering: pixelated; border: 1px solid var(--border);
  background: #000; flex-shrink: 0; cursor: pointer; }
.enum-sprite.empty { border-style: dashed; opacity: .4; }
.enum-unassign { background: transparent; border: none; color: var(--danger); font-size: 14px;
  padding: 2px 4px; opacity: .5; flex-shrink: 0; }
.enum-unassign:hover { opacity: 1; }

/* ---- Export modal ---- */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none;
  z-index: 100; align-items: center; justify-content: center; }
#modal-overlay.show { display: flex; }
#modal { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px;
  width: 700px; max-height: 80vh; display: flex; flex-direction: column; }
#modal header { border-radius: 8px 8px 0 0; }
#modal-body { padding: 12px; overflow-y: auto; flex: 1; }
#modal-body pre { background: var(--bg); padding: 12px; border-radius: var(--radius);
  font-size: 12px; white-space: pre; overflow-x: auto; max-height: 60vh; }
#modal-body textarea { width: 100%; height: 200px; font: inherit; font-size: 12px;
  background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #555; }
</style>
</head>
<body>

<header>
  <h1>BrogueCE Sprite Assigner</h1>
  <div class="spacer"></div>
  <span id="stats"></span>
  <button onclick="doExport()">Export Code</button>
  <button onclick="doExportJSON()">Export JSON</button>
  <button onclick="doImportJSON()">Import JSON</button>
  <button onclick="doReset()">Reset</button>
</header>

<main>
  <aside id="sheet-panel"></aside>

  <section id="grid-panel">
    <div id="grid-toolbar">
      <span id="sheet-label" class="label">No sheet selected</span>
      <span id="sheet-dims" class="dim"></span>
      <div id="zoom-controls">
        <button onclick="changeZoom(-1)">&minus;</button>
        <span id="zoom-level">3x</span>
        <button onclick="changeZoom(1)">+</button>
      </div>
    </div>
    <div id="grid-container">
      <canvas id="grid-canvas" width="0" height="0"></canvas>
    </div>
    <div id="selection-bar">
      <canvas id="sel-preview" width="48" height="48"></canvas>
      <div id="sel-info">Click a tile in the grid to select it</div>
      <button id="sel-clear" style="display:none" onclick="clearSelection()">Clear (Esc)</button>
    </div>
  </section>

  <aside id="enum-panel">
    <div id="enum-tabs">
      <button class="active" onclick="switchTab('tiletype')">TileType</button>
      <button onclick="switchTab('glyph')">DisplayGlyph</button>
    </div>
    <div id="enum-filter">
      <input type="text" placeholder="Filter by name..." id="filter-input" oninput="renderEnumList()">
      <select id="filter-status" onchange="renderEnumList()">
        <option value="all">All</option>
        <option value="assigned">Assigned</option>
        <option value="unassigned">Unassigned</option>
      </select>
    </div>
    <div id="enum-list"></div>
  </aside>
</main>

<div id="toast"></div>

<div id="modal-overlay" onclick="closeModal(event)">
  <div id="modal">
    <header>
      <span id="modal-title" style="font-weight:600"></span>
      <div class="spacer"></div>
      <button onclick="closeModal()">Close</button>
      <button class="primary" id="modal-copy-btn" onclick="copyModalContent()">Copy</button>
    </header>
    <div id="modal-body"></div>
  </div>
</div>

// ===========================================================================
// STATE
// ===========================================================================

let manifest = null;
let basePath = '';
const imageCache = new Map();
let currentSheetKey = null;
let selectedTile = null;
let activeTab = 'tiletype';
let zoom = 3;
let hoverTile = null;

const assignments = {
  tiletype: {},
  glyph: {}
};

// ===========================================================================
// INITIALIZATION
// ===========================================================================

async function init() {
  loadFromStorage();
  try {
    const resp = await fetch('tileset-manifest.json');
    manifest = await resp.json();
    basePath = manifest.basePath || '';
  } catch (e) {
    document.getElementById('sheet-panel').innerHTML =
      '<p style="padding:12px;color:var(--danger)">Failed to load tileset-manifest.json. ' +
      'Serve this directory via HTTP (e.g. <code>npx serve .</code> from project root).</p>';
    return;
  }
  renderSheetPanel();
  renderEnumList();
  updateStats();
  setupGridEvents();

  const firstSheet = manifest.tilesets[0]?.sheets[0];
  if (firstSheet) selectSheet(manifest.tilesets[0].id, firstSheet.key);
}

function loadFromStorage() {
  const saved = localStorage.getItem('broguece-sprite-assignments');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      assignments.tiletype = data.tiletype || {};
      assignments.glyph = data.glyph || {};
      return;
    } catch {}
  }
  Object.entries(INITIAL_TILETYPE).forEach(([k, v]) => {
    assignments.tiletype[k] = { sheet: v.s, x: v.x, y: v.y };
  });
  Object.entries(INITIAL_GLYPH).forEach(([k, v]) => {
    assignments.glyph[k] = { sheet: v.s, x: v.x, y: v.y };
  });
}

function saveToStorage() {
  localStorage.setItem('broguece-sprite-assignments', JSON.stringify(assignments));
}

// ===========================================================================
// IMAGE LOADING
// ===========================================================================

function sheetPath(sheetDef) {
  return basePath + '/' + sheetDef.path;
}

function findSheetDef(key) {
  for (const ts of manifest.tilesets) {
    const s = ts.sheets.find(sh => sh.key === key);
    if (s) return s;
  }
  return null;
}

async function loadImage(key) {
  if (imageCache.has(key)) return imageCache.get(key);
  const def = findSheetDef(key);
  if (!def) return null;
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => { imageCache.set(key, img); resolve(img); };
    img.onerror = () => { console.warn('Failed to load:', key); resolve(null); };
    img.src = sheetPath(def);
  });
}

// ===========================================================================
// SHEET PANEL (left sidebar)
// ===========================================================================

function renderSheetPanel() {
  const el = document.getElementById('sheet-panel');
  el.innerHTML = manifest.tilesets.map(ts => `
    <details class="tileset-group" open>
      <summary>${ts.name} (${ts.sheets.length})</summary>
      ${ts.sheets.map(sh => `
        <button class="sheet-btn" data-tileset="${ts.id}" data-key="${sh.key}"
          onclick="selectSheet('${ts.id}','${sh.key}')">
          ${sh.key}<span class="cat">${sh.category}</span>
        </button>
      `).join('')}
    </details>
  `).join('');
}

async function selectSheet(tilesetId, key) {
  document.querySelectorAll('.sheet-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.sheet-btn[data-key="${key}"]`);
  if (btn) btn.classList.add('active');

  currentSheetKey = key;
  selectedTile = null;
  updateSelectionBar();

  const img = await loadImage(key);
  if (!img) {
    document.getElementById('sheet-label').textContent = key + ' (failed to load)';
    return;
  }
  const cols = Math.floor(img.width / TILE_SIZE);
  const rows = Math.floor(img.height / TILE_SIZE);
  document.getElementById('sheet-label').textContent = key;
  document.getElementById('sheet-dims').textContent = `${cols}\u00D7${rows} tiles (${img.width}\u00D7${img.height}px)`;
  renderGrid();
}

// ===========================================================================
// GRID RENDERING (center panel)
// ===========================================================================

function renderGrid() {
  const canvas = document.getElementById('grid-canvas');
  const ctx = canvas.getContext('2d');
  const img = imageCache.get(currentSheetKey);
  if (!img) return;

  const w = img.width * zoom;
  const h = img.height * zoom;
  canvas.width = w;
  canvas.height = h;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, 0, 0, w, h);

  const cols = Math.floor(img.width / TILE_SIZE);
  const rows = Math.floor(img.height / TILE_SIZE);
  const ts = TILE_SIZE * zoom;

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  for (let c = 0; c <= cols; c++) {
    ctx.beginPath(); ctx.moveTo(c * ts + 0.5, 0); ctx.lineTo(c * ts + 0.5, h); ctx.stroke();
  }
  for (let r = 0; r <= rows; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * ts + 0.5); ctx.lineTo(w, r * ts + 0.5); ctx.stroke();
  }

  drawAssignmentMarkers(ctx, cols, rows, ts);

  if (hoverTile && hoverTile.sheet === currentSheetKey) {
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 2;
    ctx.strokeRect(hoverTile.x * ts + 1, hoverTile.y * ts + 1, ts - 2, ts - 2);
  }

  if (selectedTile && selectedTile.sheet === currentSheetKey) {
    ctx.strokeStyle = '#ffe04a';
    ctx.lineWidth = 2;
    ctx.strokeRect(selectedTile.x * ts + 1, selectedTile.y * ts + 1, ts - 2, ts - 2);
    ctx.strokeStyle = 'rgba(255,224,74,0.3)';
    ctx.fillStyle = 'rgba(255,224,74,0.1)';
    ctx.fillRect(selectedTile.x * ts, selectedTile.y * ts, ts, ts);
  }
}

function drawAssignmentMarkers(ctx, cols, rows, ts) {
  const assigned = new Map();
  for (const [name, ref] of Object.entries(assignments.tiletype)) {
    if (ref.sheet === currentSheetKey) {
      const k = `${ref.x},${ref.y}`;
      if (!assigned.has(k)) assigned.set(k, []);
      assigned.get(k).push('T:' + name);
    }
  }
  for (const [name, ref] of Object.entries(assignments.glyph)) {
    if (ref.sheet === currentSheetKey) {
      const k = `${ref.x},${ref.y}`;
      if (!assigned.has(k)) assigned.set(k, []);
      assigned.get(k).push('G:' + name);
    }
  }
  for (const [k, names] of assigned) {
    const [x, y] = k.split(',').map(Number);
    ctx.fillStyle = 'rgba(74,255,142,0.15)';
    ctx.fillRect(x * ts, y * ts, ts, ts);
    ctx.fillStyle = '#4aff8e';
    const dotSize = Math.max(3, zoom);
    ctx.fillRect(x * ts + 2, y * ts + 2, dotSize, dotSize);
  }
}

function changeZoom(delta) {
  zoom = Math.max(1, Math.min(8, zoom + delta));
  document.getElementById('zoom-level').textContent = zoom + 'x';
  renderGrid();
}

function setupGridEvents() {
  const canvas = document.getElementById('grid-canvas');

  canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const ts = TILE_SIZE * zoom;
    const x = Math.floor((e.clientX - rect.left) / ts);
    const y = Math.floor((e.clientY - rect.top) / ts);
    const img = imageCache.get(currentSheetKey);
    if (!img) return;
    const maxC = Math.floor(img.width / TILE_SIZE);
    const maxR = Math.floor(img.height / TILE_SIZE);
    if (x < 0 || x >= maxC || y < 0 || y >= maxR) return;

    selectedTile = { sheet: currentSheetKey, x, y };
    updateSelectionBar();
    renderGrid();
    renderEnumList();
  });

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const ts = TILE_SIZE * zoom;
    const x = Math.floor((e.clientX - rect.left) / ts);
    const y = Math.floor((e.clientY - rect.top) / ts);
    const img = imageCache.get(currentSheetKey);
    if (!img) return;
    const maxC = Math.floor(img.width / TILE_SIZE);
    const maxR = Math.floor(img.height / TILE_SIZE);
    if (x < 0 || x >= maxC || y < 0 || y >= maxR) {
      if (hoverTile) { hoverTile = null; renderGrid(); }
      return;
    }
    if (!hoverTile || hoverTile.x !== x || hoverTile.y !== y || hoverTile.sheet !== currentSheetKey) {
      hoverTile = { sheet: currentSheetKey, x, y };
      renderGrid();
    }
  });

  canvas.addEventListener('mouseleave', () => {
    if (hoverTile) { hoverTile = null; renderGrid(); }
  });
}

function updateSelectionBar() {
  const preview = document.getElementById('sel-preview');
  const info = document.getElementById('sel-info');
  const clearBtn = document.getElementById('sel-clear');
  const ctx = preview.getContext('2d');
  ctx.clearRect(0, 0, 48, 48);

  if (!selectedTile) {
    info.innerHTML = 'Click a tile in the grid to select it';
    clearBtn.style.display = 'none';
    return;
  }

  clearBtn.style.display = '';

  const img = imageCache.get(selectedTile.sheet);
  if (img) {
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(img, selectedTile.x * TILE_SIZE, selectedTile.y * TILE_SIZE,
      TILE_SIZE, TILE_SIZE, 0, 0, 48, 48);
  }

  const usedBy = [];
  for (const [name, ref] of Object.entries(assignments.tiletype)) {
    if (ref.sheet === selectedTile.sheet && ref.x === selectedTile.x && ref.y === selectedTile.y)
      usedBy.push('TileType.' + name);
  }
  for (const [name, ref] of Object.entries(assignments.glyph)) {
    if (ref.sheet === selectedTile.sheet && ref.x === selectedTile.x && ref.y === selectedTile.y)
      usedBy.push('DisplayGlyph.' + name);
  }

  let html = `<span class="coord">${selectedTile.sheet} (${selectedTile.x}, ${selectedTile.y})</span>`;
  html += `<br><span class="hint">\u2192 Click an enum on the right to assign this tile</span>`;
  if (usedBy.length) {
    html += `<br><span style="color:var(--assigned);font-size:11px">Used by: ${usedBy.join(', ')}</span>`;
  }
  info.innerHTML = html;
}

function clearSelection() {
  selectedTile = null;
  updateSelectionBar();
  renderGrid();
  renderEnumList();
}

// ===========================================================================
// ENUM LIST (right panel)
// ===========================================================================

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('#enum-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`#enum-tabs button[onclick*="${tab}"]`).classList.add('active');
  document.getElementById('filter-input').value = '';
  renderEnumList();
}

function renderEnumList() {
  const list = document.getElementById('enum-list');
  const filter = document.getElementById('filter-input').value.toLowerCase();
  const status = document.getElementById('filter-status').value;
  const names = activeTab === 'tiletype' ? TILE_TYPES : DISPLAY_GLYPHS;
  const assignMap = activeTab === 'tiletype' ? assignments.tiletype : assignments.glyph;
  const chars = activeTab === 'glyph' ? GLYPH_CHARS : null;

  let html = '';
  for (const name of names) {
    if (name === 'NOTHING' || name === 'NUMBER_TILETYPES') continue;
    if (filter && !name.toLowerCase().includes(filter)) continue;
    const ref = assignMap[name];
    if (status === 'assigned' && !ref) continue;
    if (status === 'unassigned' && ref) continue;

    const ascii = chars ? (chars[name] || '?') : '';
    const isSameTile = selectedTile && ref &&
      ref.sheet === selectedTile.sheet && ref.x === selectedTile.x && ref.y === selectedTile.y;

    html += `<div class="enum-entry${isSameTile ? ' same-tile' : ''}" data-name="${name}">`;
    if (chars) {
      html += `<span class="enum-ascii" title="ASCII: ${ascii}">${ascii}</span>`;
    }
    html += `<span class="enum-name" title="${name}">${name}</span>`;

    if (ref) {
      html += `<canvas class="enum-sprite" width="28" height="28" data-sheet="${ref.sheet}" ` +
        `data-tx="${ref.x}" data-ty="${ref.y}" title="${ref.sheet} (${ref.x}, ${ref.y})" ` +
        `onclick="event.stopPropagation(); jumpToSprite('${ref.sheet}',${ref.x},${ref.y})"></canvas>`;
      html += `<button class="enum-unassign" onclick="event.stopPropagation(); unassign('${name}')" title="Remove">\u00D7</button>`;
    } else {
      html += `<canvas class="enum-sprite empty" width="28" height="28"></canvas>`;
    }
    html += `</div>`;
  }
  list.innerHTML = html;

  list.querySelectorAll('.enum-entry').forEach(entry => {
    entry.addEventListener('click', () => assignToEnum(entry.dataset.name));
  });

  drawEnumThumbnails();
}

async function drawEnumThumbnails() {
  const canvases = document.querySelectorAll('.enum-sprite[data-sheet]');
  for (const c of canvases) {
    const sheet = c.dataset.sheet;
    const tx = parseInt(c.dataset.tx);
    const ty = parseInt(c.dataset.ty);
    const img = await loadImage(sheet);
    if (!img) continue;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, 28, 28);
    ctx.drawImage(img, tx * TILE_SIZE, ty * TILE_SIZE, TILE_SIZE, TILE_SIZE, 2, 2, 24, 24);
  }
}

// ===========================================================================
// ASSIGNMENT LOGIC
// ===========================================================================

function assignToEnum(name) {
  if (!selectedTile) return;
  const map = activeTab === 'tiletype' ? assignments.tiletype : assignments.glyph;
  map[name] = { sheet: selectedTile.sheet, x: selectedTile.x, y: selectedTile.y };
  saveToStorage();
  renderEnumList();
  renderGrid();
  updateSelectionBar();
  updateStats();
  flashAssigned(name);
  showToast(`Assigned ${name} \u2192 ${selectedTile.sheet} (${selectedTile.x}, ${selectedTile.y})`);
}

function flashAssigned(name) {
  const entry = document.querySelector(`.enum-entry[data-name="${name}"]`);
  if (!entry) return;
  entry.classList.add('flash');
  entry.scrollIntoView({ block: 'nearest' });
  setTimeout(() => entry.classList.remove('flash'), 600);
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function unassign(name) {
  const map = activeTab === 'tiletype' ? assignments.tiletype : assignments.glyph;
  delete map[name];
  saveToStorage();
  renderEnumList();
  renderGrid();
  updateSelectionBar();
  updateStats();
}

async function jumpToSprite(sheet, x, y) {
  const sheetDef = findSheetDef(sheet);
  if (!sheetDef) return;
  const ts = manifest.tilesets.find(t => t.sheets.some(s => s.key === sheet));
  if (ts) await selectSheet(ts.id, sheet);
  selectedTile = { sheet, x, y };
  updateSelectionBar();
  renderGrid();
  renderEnumList();

  const container = document.getElementById('grid-container');
  const px = x * TILE_SIZE * zoom - container.clientWidth / 2;
  const py = y * TILE_SIZE * zoom - container.clientHeight / 2;
  container.scrollTo({ left: Math.max(0, px), top: Math.max(0, py), behavior: 'smooth' });
}

function updateStats() {
  const tt = Object.keys(assignments.tiletype).length;
  const dg = Object.keys(assignments.glyph).length;
  document.getElementById('stats').textContent =
    `${tt}/${TILE_TYPES.length - 2} TileType, ${dg}/${DISPLAY_GLYPHS.length} DisplayGlyph assigned`;
}

// ===========================================================================
// EXPORT / IMPORT
// ===========================================================================

function doExport() {
  let code = '// ===== TileType sprite assignments =====\n';
  code += '// Paste into buildTileTypeSpriteMap() in glyph-sprite-map.ts\n\n';

  const ttEntries = Object.entries(assignments.tiletype)
    .sort((a, b) => TILE_TYPES.indexOf(a[0]) - TILE_TYPES.indexOf(b[0]));
  for (const [name, ref] of ttEntries) {
    const args = ref.x === 0 && ref.y === 0 ? `"${ref.sheet}"`
      : ref.y === 0 ? `"${ref.sheet}", ${ref.x}`
      : `"${ref.sheet}", ${ref.x}, ${ref.y}`;
    code += `  m.set(TileType.${name}, tile(${args}));\n`;
  }

  code += '\n// ===== DisplayGlyph sprite assignments =====\n';
  code += '// Paste into buildGlyphSpriteMap() in glyph-sprite-map.ts\n\n';

  const dgEntries = Object.entries(assignments.glyph)
    .sort((a, b) => DISPLAY_GLYPHS.indexOf(a[0]) - DISPLAY_GLYPHS.indexOf(b[0]));
  for (const [name, ref] of dgEntries) {
    const args = ref.x === 0 && ref.y === 0 ? `"${ref.sheet}"`
      : ref.y === 0 ? `"${ref.sheet}", ${ref.x}`
      : `"${ref.sheet}", ${ref.x}, ${ref.y}`;
    code += `  m.set(DisplayGlyph.${name}, tile(${args}));\n`;
  }

  showModal('Export — TypeScript Code', `<pre id="export-code">${escapeHtml(code)}</pre>`, code);
}

function doExportJSON() {
  const json = JSON.stringify(assignments, null, 2);
  showModal('Export — JSON', `<pre id="export-code">${escapeHtml(json)}</pre>`, json);
}

function doImportJSON() {
  showModal('Import JSON', `<textarea id="import-area" placeholder="Paste JSON here..."></textarea>
    <br><button class="primary" onclick="executeImport()" style="margin-top:8px">Import</button>`, null);
}

function executeImport() {
  const area = document.getElementById('import-area');
  try {
    const data = JSON.parse(area.value);
    if (data.tiletype) assignments.tiletype = data.tiletype;
    if (data.glyph) assignments.glyph = data.glyph;
    saveToStorage();
    renderEnumList();
    renderGrid();
    updateStats();
    closeModal();
  } catch (e) {
    alert('Invalid JSON: ' + e.message);
  }
}

function doReset() {
  if (!confirm('Reset all assignments to the defaults from glyph-sprite-map.ts?')) return;
  assignments.tiletype = {};
  assignments.glyph = {};
  Object.entries(INITIAL_TILETYPE).forEach(([k, v]) => {
    assignments.tiletype[k] = { sheet: v.s, x: v.x, y: v.y };
  });
  Object.entries(INITIAL_GLYPH).forEach(([k, v]) => {
    assignments.glyph[k] = { sheet: v.s, x: v.x, y: v.y };
  });
  saveToStorage();
  renderEnumList();
  renderGrid();
  updateSelectionBar();
  updateStats();
}

// ===========================================================================
// MODAL
// ===========================================================================

let modalContent = null;

function showModal(title, bodyHtml, copyText) {
  modalContent = copyText;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-copy-btn').style.display = copyText ? '' : 'none';
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('show');
}

function copyModalContent() {
  if (modalContent) {
    navigator.clipboard.writeText(modalContent).then(() => {
      const btn = document.getElementById('modal-copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    });
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===========================================================================
// KEYBOARD
// ===========================================================================

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('modal-overlay').classList.contains('show')) {
      closeModal();
    } else {
      clearSelection();
    }
  }
});

// ===========================================================================
// START
// ===========================================================================

init();
</script>
</body>
</html>
