<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brogue: Community Edition (V2)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: auto;
            font-family: monospace;
            color: #ccc;
        }

        /*
         * #brogue-root: outer flex row wrapping sidebar (left) + main content (right).
         * Hidden by default during menu/title screens; shown during gameplay when
         * DOM extraction is active. The canvas occupies #brogue-canvas-wrap.
         */
        #brogue-root {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            background: #000;
        }

        /*
         * #brogue-sidebar: DOM sidebar replacing the 20 leftmost canvas columns.
         * Width is set dynamically by bootstrap.ts to match the cell grid size.
         * Hidden until sidebar DOM extraction is active.
         */
        #brogue-sidebar {
            display: none;
            flex-direction: column;
            background: #000;
            overflow: hidden;
            flex-shrink: 0;
        }

        /*
         * #brogue-main: right column containing the canvas, message area, and
         * bottom bar regions. All three stack vertically.
         */
        #brogue-main {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /*
         * #brogue-canvas-wrap: holds the canvas element.
         * During menu screens the canvas is full 100×34; during gameplay with DOM
         * extraction active, the canvas renders only the dungeon viewport (Phase 4).
         * For Phase 1 the canvas retains its current full dimensions.
         */
        #brogue-canvas-wrap {
            position: relative;
        }

        /*
         * #brogue-messages: message area (Phase 2). Hidden until extracted.
         */
        #brogue-messages {
            display: none;
            background: #000;
            padding: 2px 4px;
            font-size: 14px;
            line-height: 1.4;
        }

        /*
         * #brogue-bottom-bar: bottom action bar (Phase 2). Hidden until extracted.
         */
        #brogue-bottom-bar {
            display: none;
            background: #111;
            padding: 2px 4px;
        }
    </style>
</head>
<body>
    <div id="brogue-root">
        <div id="brogue-sidebar" role="complementary" aria-label="Sidebar"></div>
        <div id="brogue-main">
            <div id="brogue-canvas-wrap">
                <canvas id="brogue-canvas"></canvas>
            </div>
            <div id="brogue-messages" role="log" aria-live="polite" aria-label="Messages"></div>
            <div id="brogue-bottom-bar" role="toolbar" aria-label="Game controls"></div>
        </div>
    </div>
    <script type="module" src="./src/bootstrap.ts"></script>
</body>
</html>
